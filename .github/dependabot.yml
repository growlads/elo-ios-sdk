version: 2
updates:
  # Note: the `swift` ecosystem is intentionally omitted. `Package.swift` in
  # this repo is regenerated by the upstream publish workflow on every
  # release, so any Dependabot-driven edits would be clobbered. Swift
  # dependency upkeep happens in the source repo.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
