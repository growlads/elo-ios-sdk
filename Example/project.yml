name: GrowlAdsExample
options:
  bundleIdPrefix: com.growl.example
  deploymentTarget:
    iOS: "16.0"

# Resolves the GrowlAds package from this repo's own Package.swift, which
# pulls the binary GrowlAds.xcframework from the matching tagged release.
# Swap in:
#
#   GrowlAds:
#     url: https://github.com/growlads/growl-ios-sdk
#     from: "0.0.1"
#
# to demo the tagged-release flow without a local checkout.
packages:
  GrowlAds:
    path: ..

targets:
  GrowlAdsExample:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: GrowlAds
        product: GrowlAds
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.growl.example.GrowlAdsExample
        SWIFT_VERSION: "5.0"
