name: EloAdsExample
options:
  bundleIdPrefix: com.elo.example
  deploymentTarget:
    iOS: "16.0"

# Resolves the EloAds package from this repo's own Package.swift, which
# pulls the binary EloAds.xcframework from the matching tagged release.
# Swap in:
#
#   EloAds:
#     url: https://github.com/growlads/elo-ios-sdk
#     from: "0.0.1"
#
# to demo the tagged-release flow without a local checkout.
packages:
  EloAds:
    path: ..

targets:
  EloAdsExample:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: EloAds
        product: EloAds
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.elo.example.EloAdsExample
        SWIFT_VERSION: "5.0"
