name: EloAdsExample
options:
  bundleIdPrefix: com.elo.example
  deploymentTarget:
    iOS: "16.0"

# Consumes EloAds via SwiftPM from the public dist-repo, exactly as a
# real integrator would. Bump `from:` when pinning a newer release.
packages:
  EloAds:
    url: https://github.com/growlads/elo-ios-sdk
    from: "0.1.0"

targets:
  EloAdsExample:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: EloAds
        product: EloAds
      - package: EloAds
        product: EloAdsMediationAdMob
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.elo.example.EloAdsExample
        SWIFT_VERSION: "5.0"
