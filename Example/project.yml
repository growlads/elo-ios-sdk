name: EloAdsExample
options:
  bundleIdPrefix: com.elo.example
  deploymentTarget:
    iOS: "16.0"

# Consumes EloAds via SwiftPM from the public dist-repo, exactly as a
# real integrator would. Pinned exactly (not `from:`) because the SDK
# is pre-1.0 — under SemVer's 0.x rule, minor bumps can be breaking, so
# upToNextMajor would silently pull 0.2.0+ into the demo. Bump `version`
# when validating a newer release.
packages:
  EloAds:
    url: https://github.com/growlads/elo-ios-sdk
    exactVersion: "0.1.0"

targets:
  EloAdsExample:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: EloAds
        product: EloAds
      - package: EloAds
        product: EloAdsMediationAdMob
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.elo.example.EloAdsExample
        SWIFT_VERSION: "5.0"
